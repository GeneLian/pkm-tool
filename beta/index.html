<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>寶可夢兒童圖鑑 v1.3.3</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-touch-callout: none;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .app-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        /* 頂部手動控制列 (55px) */
        .top-control-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 55px;
            background: rgba(11, 29, 58, 0.98);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            z-index: 40;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            padding: 0 10px;
        }

        .version-tag {
            background-color: #ffcb05;
            color: #1a3c8e;
            font-size: 12px;
            font-weight: bold;
            padding: 4px 8px;
            border-radius: 10px;
            margin-right: 4px;
        }

        .top-control-bar label {
            color: #ffcb05;
            font-size: 15px;
            font-weight: bold;
        }

        .id-input {
            width: 75px;
            height: 36px;
            background-color: #fff;
            border: 2px solid #ffcb05;
            border-radius: 18px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            color: #1a3c8e;
            outline: none;
        }

        .go-btn {
            background-color: #ffcb05;
            color: #1a3c8e;
            border: none;
            border-radius: 18px;
            padding: 6px 14px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .go-btn:active {
            transform: scale(0.95);
        }

        /* 頂部物理防呆遮擋條：覆蓋在 iframe 上方，專門擋住官方首頁按鈕，不影響下方網頁捲動 */
        .top-shield {
            position: absolute;
            top: 55px;
            left: 0;
            width: 100%;
            height: 35px;
            background: linear-gradient(to bottom, #0b1d3a 60%, rgba(11, 29, 58, 0));
            z-index: 25;
            pointer-events: auto; /* 阻擋誤觸官方按鈕 */
        }

        /* iframe 完整佔滿剩餘空間，允許內部順暢上下滑動 */
        iframe {
            position: absolute;
            top: 55px;
            left: 0;
            width: 100%;
            height: calc(100% - 55px);
            border: none;
            background-color: #0b1d3a;
            z-index: 10;
        }

        /* 左右懸浮翻頁按鈕 */
        .floating-btn {
            position: absolute;
            top: 55%;
            transform: translateY(-50%);
            width: 55px;
            height: 95px;
            background-color: rgba(255, 203, 5, 0.75);
            color: #1a3c8e;
            font-size: 30px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            z-index: 30;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .floating-btn:active {
            background-color: rgba(255, 203, 5, 1);
        }

        #prev-btn {
            left: 0;
            border-top-right-radius: 18px;
            border-bottom-right-radius: 18px;
        }

        #next-btn {
            right: 0;
            border-top-left-radius: 18px;
            border-bottom-left-radius: 18px;
        }
    </style>
</head>
<body>

    <div class="app-container" id="appContainer">
        
        <div class="top-control-bar">
            <span class="version-tag">v1.3.3</span>
            <label for="manualId">編號:</label>
            <input type="number" id="manualId" class="id-input" min="1" max="1025" value="1" placeholder="0001">
            <button class="go-btn" onclick="jumpToPokemon()">跳轉</button>
        </div>

        <div class="top-shield"></div>

        <iframe id="pokedex-frame" src="https://tw.portal-pokemon.com/play/pokedex/0001" title="寶可夢兒童圖鑑"></iframe>

        <button class="floating-btn" id="prev-btn" onclick="prevPokemon()">◀</button>
        <button class="floating-btn" id="next-btn" onclick="nextPokemon()">▶</button>

    </div>

    <script>
        let currentId = 1;
        const maxId = 1025;
        const iframe = document.getElementById('pokedex-frame');
        const manualInput = document.getElementById('manualId');

        function updatePokemon() {
            if (currentId < 1) currentId = 1;
            if (currentId > maxId) currentId = maxId;

            let paddedId = String(currentId).padStart(4, '0');
            let newUrl = `https://tw.portal-pokemon.com/play/pokedex/${paddedId}`;
            
            iframe.src = newUrl;
            manualInput.value = currentId;
        }

        function nextPokemon() {
            if (currentId < maxId) {
                currentId++;
                updatePokemon();
            }
        }

        function prevPokemon() {
            if (currentId > 1) {
                currentId--;
                updatePokemon();
            }
        }

        function jumpToPokemon() {
            let val = parseInt(manualInput.value, 10);
            if (!isNaN(val)) {
                if (val >= 1 && val <= maxId) {
                    currentId = val;
                    updatePokemon();
                } else {
                    alert(`請輸入 1 到 ${maxId} 之間的寶可夢編號！`);
                    manualInput.value = currentId;
                }
            }
        }

        manualInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                jumpToPokemon();
            }
        });

        // 支援全螢幕左右滑動 (Swipe) 翻頁
        let touchStartX = 0;
        let touchStartY = 0;
        let touchEndX = 0;
        let touchEndY = 0;

        const container = document.getElementById('appContainer');

        container.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        }, false);

        container.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            touchEndY = e.changedTouches[0].screenY;
            handleSwipe();
        }, false);

        function handleSwipe() {
            let diffX = touchEndX - touchStartX;
            let diffY = touchEndY - touchStartY;

            if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 50) {
                if (diffX < 0) {
                    nextPokemon();
                } else {
                    prevPokemon();
                }
            }
        }
    </script>

</body>
</html>
