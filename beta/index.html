<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>寶可夢兒童圖鑑 v1.3.4</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-touch-callout: none;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .app-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        /* 頂部手動控制列 (55px) */
        .top-control-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 55px;
            background: rgba(11, 29, 58, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            z-index: 30;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            padding: 0 6px;
        }

        .version-tag {
            background-color: #ffcb05;
            color: #1a3c8e;
            font-size: 11px;
            font-weight: bold;
            padding: 4px 6px;
            border-radius: 8px;
        }

        .top-control-bar label {
            color: #ffcb05;
            font-size: 14px;
            font-weight: bold;
        }

        .id-input {
            width: 65px;
            height: 36px;
            background-color: #fff;
            border: 2px solid #ffcb05;
            border-radius: 18px;
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            color: #1a3c8e;
            outline: none;
        }

        .go-btn, .speak-btn {
            background-color: #ffcb05;
            color: #1a3c8e;
            border: none;
            border-radius: 18px;
            padding: 6px 10px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .speak-btn {
            background-color: #ff5722; /* 讓朗讀按鈕用顯眼的橘紅色，吸引小朋友注意 */
            color: #fff;
            font-size: 16px;
            padding: 6px 12px;
        }

        .go-btn:active, .speak-btn:active {
            transform: scale(0.95);
        }

        /* 畫面裁切視窗與嵌入圖鑑 */
        .iframe-viewport {
            position: absolute;
            top: 55px;
            left: 0;
            width: 100%;
            height: calc(100% - 55px);
            overflow: hidden;
            background-color: #0b1d3a;
        }

        /* 讓 iframe 往上位移並增加高度，把官方首頁按鈕藏在上方控制列後面 */
        iframe {
            position: absolute;
            top: -75px; 
            left: 0;
            width: 100%;
            height: calc(100% + 75px);
            border: none;
        }

        /* 左右懸浮翻頁按鈕 */
        .floating-btn {
            position: absolute;
            top: 55%;
            transform: translateY(-50%);
            width: 55px;
            height: 95px;
            background-color: rgba(255, 203, 5, 0.75);
            color: #1a3c8e;
            font-size: 30px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            z-index: 20;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .floating-btn:active {
            background-color: rgba(255, 203, 5, 1);
        }

        #prev-btn {
            left: 0;
            border-top-right-radius: 18px;
            border-bottom-right-radius: 18px;
        }

        #next-btn {
            right: 0;
            border-top-left-radius: 18px;
            border-bottom-left-radius: 18px;
        }
    </style>
</head>
<body>

    <div class="app-container" id="appContainer">
        
        <div class="top-control-bar">
            <span class="version-tag">v1.3.4</span>
            <label for="manualId">編號:</label>
            <input type="number" id="manualId" class="id-input" min="1" max="1025" value="1" placeholder="0001">
            <button class="go-btn" onclick="jumpToPokemon()">跳轉</button>
            <button class="speak-btn" onclick="speakPokemonName()" title="大聲朗讀">🔊 唸名字</button>
        </div>

        <div class="iframe-viewport">
            <iframe id="pokedex-frame" src="https://tw.portal-pokemon.com/play/pokedex/0001" title="寶可夢兒童圖鑑"></iframe>
        </div>

        <button class="floating-btn" id="prev-btn" onclick="prevPokemon()">◀</button>
        <button class="floating-btn" id="next-btn" onclick="nextPokemon()">▶</button>

    </div>

    <script>
        let currentId = 1;
        const maxId = 1025;
        const iframe = document.getElementById('pokedex-frame');
        const manualInput = document.getElementById('manualId');

        // 簡易常用寶可夢名稱字典（後續可隨時擴充）
        const pokemonNames = {
            1: "妙蛙種子",
            2: "妙蛙草",
            3: "妙蛙花",
            4: "小火龍",
            5: "火恐龍",
            6: "噴火龍",
            7: "傑尼龜",
            8: "卡咪龜",
            9: "水箭龜",
            25: "皮卡丘",
            26: "雷丘",
            39: "胖丁",
            52: "喵喵",
            133: "伊布",
            143: "卡比獸",
            150: "超夢"
        };

        function updatePokemon() {
            if (currentId < 1) currentId = 1;
            if (currentId > maxId) currentId = maxId;

            let paddedId = String(currentId).padStart(4, '0');
            let newUrl = `https://tw.portal-pokemon.com/play/pokedex/${paddedId}`;
            
            iframe.src = newUrl;
            manualInput.value = currentId;
        }

        // 語音朗讀核心功能
        function speakPokemonName() {
            if (!('speechSynthesis' in window)) {
                alert("您的瀏覽器不支援語音朗讀功能！");
                return;
            }

            // 取得對應名字，若字典裡沒有則預設念出「第 X 號寶可夢」
            let name = pokemonNames[currentId] || `第 ${currentId} 號寶可夢`;
            
            // 建立語音朗讀請求
            let utterance = new SpeechSynthesisUtterance(name);
            utterance.lang = 'zh-TW'; // 設定為台灣繁體中文口音
            utterance.rate = 0.9;     // 語速稍微放慢，適合小朋友聆聽
            
            window.speechSynthesis.cancel(); // 停止前面尚未念完的語音，確保即時反應
            window.speechSynthesis.speak(utterance);
        }

        function nextPokemon() {
            if (currentId < maxId) {
                currentId++;
                updatePokemon();
            }
        }

        function prevPokemon() {
            if (currentId > 1) {
                currentId--;
                updatePokemon();
            }
        }

        function jumpToPokemon() {
            let val = parseInt(manualInput.value, 10);
            if (!isNaN(val)) {
                if (val >= 1 && val <= maxId) {
                    currentId = val;
                    updatePokemon();
                } else {
                    alert(`請輸入 1 到 ${maxId} 之間的寶可夢編號！`);
                    manualInput.value = currentId;
                }
            }
        }

        manualInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                jumpToPokemon();
            }
        });

        // 支援全螢幕左右滑動 (Swipe) 翻頁
        let touchStartX = 0;
        let touchStartY = 0;
        let touchEndX = 0;
        let touchEndY = 0;

        const container = document.getElementById('appContainer');

        container.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        }, false);

        container.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            touchEndY = e.changedTouches[0].screenY;
            handleSwipe();
        }, false);

        function handleSwipe() {
            let diffX = touchEndX - touchStartX;
            let diffY = touchEndY - touchStartY;

            if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 50) {
                if (diffX < 0) {
                    nextPokemon();
                } else {
                    prevPokemon();
                }
            }
        }
    </script>

</body>
</html>
