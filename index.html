<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>寶可夢兒童圖鑑</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .iframe-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        /* 讓 iframe 完整佔滿畫面，微調 top 讓官方標題剛好露出或藏好 */
        iframe {
            position: absolute;
            top: -40px; 
            left: 0;
            width: 100%;
            height: calc(100% + 40px);
            border: none;
        }

        /* 全螢幕透明滑動層：專門用來抓左右滑動 */
        .touch-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            background: transparent;
            pointer-events: auto;
        }

        /* 頂部遮罩：遮住官方雜亂選單 */
        .top-shield {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 50px;
            background: linear-gradient(to bottom, rgba(26,26,26,0.95), transparent);
            z-index: 10;
            pointer-events: none;
        }

        /* 懸浮左右超大透明按鈕（貼在畫面左右側，不遮擋主圖下方） */
        .side-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 60px;
            height: 120px;
            background-color: rgba(255, 203, 5, 0.6);
            color: #1a3c8e;
            font-size: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            z-index: 15;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .side-btn:active {
            background-color: rgba(255, 203, 5, 0.9);
        }
        #prev-btn {
            left: 0;
            border-top-right-radius: 20px;
            border-bottom-right-radius: 20px;
        }
        #next-btn {
            right: 0;
            border-top-left-radius: 20px;
            border-bottom-left-radius: 20px;
        }

        /* 底部極簡編號提示（不再遮擋圖片） */
        .bottom-indicator {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: #ffcb05;
            font-size: 18px;
            font-weight: bold;
            padding: 6px 16px;
            border-radius: 20px;
            z-index: 15;
            pointer-events: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div class="iframe-container" id="container">
        <div class="top-shield"></div>

        <!-- 嵌入寶可夢圖鑑 iframe -->
        <iframe id="pokedex-frame" src="https://tw.portal-pokemon.com/play/pokedex/0001" title="寶可夢兒童圖鑑"></iframe>

        <!-- 左右懸浮按鈕 -->
        <button class="side-btn" id="prev-btn" onclick="prevPokemon()">◀</button>
        <button class="side-btn" id="next-btn" onclick="nextPokemon()">▶</button>

        <!-- 觸控滑動攔截層 -->
        <div class="touch-layer" id="touchLayer"></div>

        <!-- 底部極簡編號 -->
        <div class="bottom-indicator" id="id-display">No. 0001</div>
    </div>

    <script>
        let currentId = 1;
        const maxId = 1025;

        function updatePokemon() {
            let paddedId = String(currentId).padStart(4, '0');
            let newUrl = `https://tw.portal-pokemon.com/play/pokedex/${paddedId}`;
            
            document.getElementById('pokedex-frame').src = newUrl;
            document.getElementById('id-display').innerText = `No. ${paddedId}`;
        }

        function nextPokemon() {
            if (currentId < maxId) {
                currentId++;
                updatePokemon();
            }
        }

        function prevPokemon() {
            if (currentId > 1) {
                currentId--;
                updatePokemon();
            }
        }

        // 手機觸控左右滑動 (Swipe) 邏輯
        let touchStartX = 0;
        let touchEndX = 0;
        const touchLayer = document.getElementById('touchLayer');

        touchLayer.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        }, false);

        touchLayer.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        }, false);

        function handleSwipe() {
            let threshold = 40; // 降低滑動門檻，更好翻頁
            if (touchEndX < touchStartX - threshold) {
                nextPokemon(); // 往左滑 -> 下一隻
            }
            if (touchEndX > touchStartX + threshold) {
                prevPokemon(); // 往右滑 -> 上一隻
            }
        }
    </script>

</body>
</html>
