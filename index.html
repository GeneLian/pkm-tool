<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>寶可夢兒童圖鑑</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-touch-callout: none;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* 主容器：採用三欄式排版 (左、中、右) */
        .app-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            overflow: hidden;
        }

        /* 中間：iframe 瀏覽區 (讓官方圖鑑完整呈現) */
        .center-viewport {
            position: relative;
            flex-grow: 1;
            height: 100%;
            overflow: hidden;
            background-color: #0b1d3a;
        }

        /* 調整 iframe 讓官方畫面置中且不被裁切重要部位 */
        iframe {
            position: absolute;
            top: -20px;
            left: 0;
            width: 100%;
            height: calc(100% + 40px);
            border: none;
            pointer-events: none; /* 讓點擊與滑動穿透到外層控制區 */
        }

        /* 頂部遮罩：擋住官方雜亂選單 */
        .top-shield {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 50px;
            background: linear-gradient(to bottom, rgba(11,29,58,0.95), transparent);
            z-index: 10;
            pointer-events: none;
        }

        /* 左右兩側的翻頁觸控區 */
        .side-zone {
            position: absolute;
            top: 0;
            width: 20%; /* 左右各佔 20% 寬度作為點擊/滑動翻頁區 */
            height: 100%;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.03); /* 微弱的視覺提示，可依喜好調整透明度 */
            transition: background 0.2s;
        }

        .side-zone:active {
            background: rgba(255, 203, 5, 0.2);
        }

        #left-zone {
            left: 0;
        }

        #right-zone {
            right: 0;
        }

        /* 左右大箭頭樣式 */
        .arrow-icon {
            font-size: 36px;
            color: rgba(255, 203, 5, 0.8);
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="app-container" id="appContainer">
        
        <div class="side-zone" id="left-zone" onclick="prevPokemon()">
            <div class="arrow-icon">◀</div>
        </div>

        <div class="center-viewport">
            <div class="top-shield"></div>
            <iframe id="pokedex-frame" src="https://tw.portal-pokemon.com/play/pokedex/0001" title="寶可夢兒童圖鑑"></iframe>
        </div>

        <div class="side-zone" id="right-zone" onclick="nextPokemon()">
            <div class="arrow-icon">▶</div>
        </div>

    </div>

    <script>
        let currentId = 1;
        const maxId = 1025;

        function updatePokemon() {
            let paddedId = String(currentId).padStart(4, '0');
            let newUrl = `https://tw.portal-pokemon.com/play/pokedex/${paddedId}`;
            document.getElementById('pokedex-frame').src = newUrl;
        }

        function nextPokemon() {
            if (currentId < maxId) {
                currentId++;
                updatePokemon();
            }
        }

        function prevPokemon() {
            if (currentId > 1) {
                currentId--;
                updatePokemon();
            }
        }

        // 支援全螢幕左右滑動 (Swipe)
        let touchStartX = 0;
        let touchEndX = 0;

        const container = document.getElementById('appContainer');

        container.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        }, false);

        container.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        }, false);

        function handleSwipe() {
            let threshold = 50; // 滑動距離門檻
            if (touchEndX < touchStartX - threshold) {
                nextPokemon(); // 往左滑 -> 下一隻
            }
            if (touchEndX > touchStartX + threshold) {
                prevPokemon(); // 往右滑 -> 上一隻
            }
        }
    </script>

</body>
</html>
