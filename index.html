<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>寶可夢兒童圖鑑</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .iframe-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        /* 讓 iframe 稍微放大並往上移，遮掉官方原本的導覽列 */
        iframe {
            position: absolute;
            top: -50px; 
            left: 0;
            width: 100%;
            height: calc(100% + 50px);
            border: none;
        }

        /* 透明互動層：用來接收小朋友的左右滑動手勢 */
        .touch-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: calc(100% - 90px); /* 留給底部按鈕空間 */
            z-index: 5;
            background: transparent;
        }

        /* 頂部遮罩 */
        .top-shield {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: linear-gradient(to bottom, rgba(26,26,26,0.95), transparent);
            z-index: 10;
            pointer-events: none;
        }

        /* 底部兒童專用控制列 */
        .bottom-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 90px;
            background: rgba(255, 255, 255, 0.95);
            border-top-left-radius: 25px;
            border-top-right-radius: 25px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 20;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.3);
            padding: 0 20px;
        }

        /* 超大童趣按鈕 */
        .kid-btn {
            background-color: #ffcb05;
            color: #1a3c8e;
            font-size: 22px;
            font-weight: bold;
            padding: 12px 24px;
            border: none;
            border-radius: 35px;
            box-shadow: 0 5px 0 #c79d00;
            cursor: pointer;
            outline: none;
        }
        .kid-btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #c79d00;
        }

        .center-info {
            font-size: 20px;
            font-weight: bold;
            color: #3b5ba9;
        }
    </style>
</head>
<body>

    <div class="iframe-container" id="container">
        <div class="top-shield"></div>

        <!-- 嵌入寶可夢圖鑑 iframe，預設從 0001 開始 -->
        <iframe id="pokedex-frame" src="https://tw.portal-pokemon.com/play/pokedex/0001" title="寶可夢兒童圖鑑"></iframe>

        <!-- 觸控滑動攔截層 -->
        <div class="touch-layer" id="touchLayer"></div>

        <!-- 底部大按鈕操作列 -->
        <div class="bottom-bar">
            <button class="kid-btn" onclick="prevPokemon()">⬅️ 上一隻</button>
            <div class="center-info" id="id-display">No. 0001</div>
            <button class="kid-btn" onclick="nextPokemon()">下一隻 ➡️</button>
        </div>
    </div>

    <script>
        let currentId = 1;
        const maxId = 1025; // 目前寶可夢大約的總數

        function updatePokemon() {
            // 將數字補齊為 4 位數格式 (例如 1 變成 "0001")
            let paddedId = String(currentId).padStart(4, '0');
            let newUrl = `https://tw.portal-pokemon.com/play/pokedex/${paddedId}`;
            
            // 更新 iframe 網址
            document.getElementById('pokedex-frame').src = newUrl;
            // 更新底部顯示編號
            document.getElementById('id-display').innerText = `No. ${paddedId}`;
        }

        function nextPokemon() {
            if (currentId < maxId) {
                currentId++;
                updatePokemon();
            }
        }

        function prevPokemon() {
            if (currentId > 1) {
                currentId--;
                updatePokemon();
            }
        }

        // 支援手機觸控左右滑動 (Swipe)
        let touchStartX = 0;
        let touchEndX = 0;

        const touchLayer = document.getElementById('touchLayer');

        touchLayer.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        }, false);

        touchLayer.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        }, false);

        function handleSwipe() {
            let threshold = 50; // 滑動距離門檻
            if (touchEndX < touchStartX - threshold) {
                // 往左滑 -> 下一隻
                nextPokemon();
            }
            if (touchEndX > touchStartX + threshold) {
                // 右滑 -> 上一隻
                prevPokemon();
            }
        }
    </script>

</body>
</html>
