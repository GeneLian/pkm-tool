<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>寶可夢兒童圖鑑</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-touch-callout: none;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* 主容器 */
        .app-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        /* 讓 iframe 完整呈現，並允許內部捲動 */
        iframe {
            position: absolute;
            top: -30px;
            left: 0;
            width: 100%;
            height: calc(100% + 30px);
            border: none;
            /* 恢復預設，讓使用者可以上下捲動 iframe 內的網頁 */
        }

        /* 頂部遮罩：擋住官方雜亂選單 */
        .top-shield {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 50px;
            background: linear-gradient(to bottom, rgba(11,29,58,0.95), transparent);
            z-index: 10;
            pointer-events: none;
        }

        /* 懸浮左右翻頁按鈕（浮在畫面上兩側，不影響中間捲動） */
        .floating-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 60px;
            height: 100px;
            background-color: rgba(255, 203, 5, 0.7);
            color: #1a3c8e;
            font-size: 32px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            z-index: 20;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .floating-btn:active {
            background-color: rgba(255, 203, 5, 1);
        }

        #prev-btn {
            left: 0;
            border-top-right-radius: 20px;
            border-bottom-right-radius: 20px;
        }

        #next-btn {
            right: 0;
            border-top-left-radius: 20px;
            border-bottom-left-radius: 20px;
        }
    </style>
</head>
<body>

    <div class="app-container" id="appContainer">
        
        <div class="top-shield"></div>

        <!-- 嵌入寶可夢圖鑑 iframe -->
        <iframe id="pokedex-frame" src="https://tw.portal-pokemon.com/play/pokedex/0001" title="寶可夢兒童圖鑑"></iframe>

        <!-- 左右懸浮翻頁按鈕 -->
        <button class="floating-btn" id="prev-btn" onclick="prevPokemon()">◀</button>
        <button class="floating-btn" id="next-btn" onclick="nextPokemon()">▶</button>

    </div>

    <script>
        let currentId = 1;
        const maxId = 1025;

        function updatePokemon() {
            let paddedId = String(currentId).padStart(4, '0');
            let newUrl = `https://tw.portal-pokemon.com/play/pokedex/${paddedId}`;
            document.getElementById('pokedex-frame').src = newUrl;
        }

        function nextPokemon() {
            if (currentId < maxId) {
                currentId++;
                updatePokemon();
            }
        }

        function prevPokemon() {
            if (currentId > 1) {
                currentId--;
                updatePokemon();
            }
        }

        // 支援全螢幕左右滑動 (Swipe) 翻頁，同時保留上下捲動
        let touchStartX = 0;
        let touchStartY = 0;
        let touchEndX = 0;
        let touchEndY = 0;

        const container = document.getElementById('appContainer');

        container.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        }, false);

        container.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            touchEndY = e.changedTouches[0].screenY;
            handleSwipe();
        }, false);

        function handleSwipe() {
            let diffX = touchEndX - touchStartX;
            let diffY = touchEndY - touchStartY;

            // 判斷是否為「水平左右滑動」大於「垂直上下捲動」，避免影響正常上下看內容
            if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 50) {
                if (diffX < 0) {
                    nextPokemon(); // 往左滑 -> 下一隻
                } else {
                    prevPokemon(); // 往右滑 -> 上一隻
                }
            }
        }
    </script>

</body>
</html>
